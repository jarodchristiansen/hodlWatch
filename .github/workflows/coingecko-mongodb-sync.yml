name: CoinGecko MongoDB sync

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-coingecko-sync.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-coingecko-sync.txt

      - name: Sync CoinGecko markets to MongoDB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          # With COINGECKO_API_KEY (Pro): set repo variable for more pages (default 20 in script).
          # Without a key, the script caps pages + enforces min delay on GitHub Actions.
          MAX_PAGES: ${{ vars.COINGECKO_SYNC_MAX_PAGES }}
          COINGECKO_INITIAL_DELAY_SEC: "25"
        run: python scripts/sync_coingecko_assets.py
