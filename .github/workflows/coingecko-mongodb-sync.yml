name: CoinGecko MongoDB sync

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-coingecko-sync.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-coingecko-sync.txt

      - name: Sync CoinGecko markets to MongoDB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          # Optional repo variable COINGECKO_SYNC_MAX_PAGES overrides default (20) when set
          MAX_PAGES: ${{ vars.COINGECKO_SYNC_MAX_PAGES }}
          # Free CoinGecko tier + GitHub shared IPs hit 429 often; ease off before/ between pages
          COINGECKO_INITIAL_DELAY_SEC: "25"
          PAGE_SLEEP_SEC: "3"
        run: python scripts/sync_coingecko_assets.py
